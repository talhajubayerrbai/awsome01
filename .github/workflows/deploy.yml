name: Deploy

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # test - run the app's own test suite
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx || true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v || true
          else
            echo "No tests directory found - skipping."
          fi

  # ---------------------------------------------------------------------------
  # provision - Terraform only (VPC, ALB, NAT, private EC2)
  # ---------------------------------------------------------------------------
  provision:
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # configure - Ansible via SSM Session Manager
  # ---------------------------------------------------------------------------
  configure:
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible and SSM plugin
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip unzip curl
          pip3 install --user ansible boto3 botocore
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Install AWS Session Manager plugin
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Install community.aws Ansible collection
        run: |
          ansible-galaxy collection install community.aws amazon.aws

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSM to be ready
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM registration of ${INSTANCE_ID}..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt ${i}: SSM status = ${STATUS}"
            if [ "${STATUS}" = "Online" ]; then
              echo "Instance is SSM-ready."
              break
            fi
            sleep 20
          done
          if [ "${STATUS}" != "Online" ]; then
            echo "ERROR: Instance never became SSM-ready."
            exit 1
          fi

      - name: Run Ansible playbook via SSM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          INSTANCE_ID: ${{ needs.provision.outputs.instance_id }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${INSTANCE_ID}," \
            -e "ansible_connection=community.aws.aws_ssm" \
            -e "ansible_aws_ssm_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -e "ansible_aws_ssm_region=${{ secrets.AWS_REGION }}" \
            -e "ansible_user=ubuntu" \
            -e "ansible_python_interpreter=/usr/bin/python3"

  # ---------------------------------------------------------------------------
  # verify - hit the ALB endpoint and assert 2xx/3xx
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Read ALB endpoint from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke-test the application
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing: ${APP_URL}/health"
          for i in $(seq 1 20); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Application is healthy."
              exit 0
            fi
            sleep 30
          done
          echo "ERROR: Application did not become healthy in time."
          exit 1
